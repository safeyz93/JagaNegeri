name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get Supabase key from secrets
        run: |
          sed -i "s|SUPABASE_ANON_KEY = .*|SUPABASE_ANON_KEY = \"${{ secrets.SUPABASE_ANON_KEY }}\"|" \
            app/src/main/java/com/jaganegeri/util/Constants.kt || true

      - name: Build APK Debug
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JagaNegeri-APK
          path: app/build/outputs/apk/debug/*.apk
